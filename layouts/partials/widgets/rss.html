{{ with .Site.Params.rss_widget }}
<div class="bg-white panel mb-3 dark:bg-warmgray-900" id="rss-widget">
  <p class="text-xl text-center text-gray-700 py-3 pl-3 dark:text-gray-300 font-bold">{{ .title }}</p>
  <div class="panel-block p-2" id="rss-list">
    <p class="text-sm text-gray-400 text-center py-2">読み込み中...</p>
  </div>
</div>
<script>
(function() {
  const proxy = "{{ .proxy }}";
  const feeds = [{{ range .feeds }}"{{ . }}",{{ end }}];
  const count = {{ .count }};
  const params = feeds.map(f => "url=" + encodeURIComponent(f)).join("&") + "&count=" + count;

  fetch(proxy + "?" + params)
    .then(r => r.json())
    .then(data => {
      const el = document.getElementById("rss-list");
      if (!data.items || data.items.length === 0) { el.innerHTML = '<p class="text-sm text-gray-400 text-center py-2">記事なし</p>'; return; }
      el.innerHTML = data.items.map(item => {
        const site = item.siteTitle ? `<span style="font-size:0.75em;color:#9ca3af;">／${item.siteTitle}</span>` : "";
        return `<div class="py-1 border-b border-gray-100 dark:border-warmgray-800">
          <a href="${item.link}" target="_blank" rel="nofollow noopener"
            class="flex gap-2 items-start hover:opacity-80">
            ${item.thumb ? `<img src="${item.thumb}" style="width:112px;height:112px;object-fit:cover;flex-shrink:0;">` : ""}
            <span class="text-sm text-blue-500 leading-snug">${item.title}${site}</span>
          </a>
        </div>`;
      }).join("");
    })
    .catch(() => {
      document.getElementById("rss-list").innerHTML = '<p class="text-sm text-gray-400 text-center py-2">取得失敗</p>';
    });
})();
</script>
{{ end }}
